name: reminder

x-app-base: &app-base
  build:
    context: .
    dockerfile: docker/Dockerfile
    args:
      PYTHON_VERSION: ${PYTHON_VERSION:-3.12}
      PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
      PIP_EXTRA_INDEX_URL: ${PIP_EXTRA_INDEX_URL:-}
  image: reminder-app:local
  restart: unless-stopped
  init: true
  env_file:
    - .env
  environment:
    DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-123456}@postgres:5432/${POSTGRES_DB:-agentic}
    CELERY_BROKER_URL: redis://redis:6379/0
    CELERY_RESULT_BACKEND: redis://redis:6379/1
    MILVUS_URI: ${MILVUS_URI:-http://milvus:19530}
    MILVUS_DB_NAME: ${MILVUS_DB_NAME:-default}
    GRAPH_BACKEND: ${GRAPH_BACKEND:-neo4j}
    NEO4J_ENABLED: ${NEO4J_ENABLED:-true}
    NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
    NEO4J_USER: ${NEO4J_USER:-neo4j}
    NEO4J_PASSWORD: ${NEO4J_PASSWORD:-change-this-in-production}
    NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
    NEO4J_MAX_CONNECTION_POOL_SIZE: ${NEO4J_MAX_CONNECTION_POOL_SIZE:-20}
    PYTHONPATH: /app
    WAIT_FOR_HOSTS: ${WAIT_FOR_HOSTS:-postgres:5432,redis:6379,neo4j:7687}
    WAIT_FOR_URLS: ${WAIT_FOR_URLS:-}
    WAIT_FOR_TIMEOUT_SECONDS: ${WAIT_FOR_TIMEOUT_SECONDS:-180}
  volumes:
    - ./storage:/app/storage

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "3"

services:
  postgres:
    image: postgres:17
    container_name: reminder-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123456}
      POSTGRES_DB: ${POSTGRES_DB:-agentic}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-agentic}"]
      interval: 10s
      timeout: 5s
      retries: 10

  etcd:
    profiles: ["vector"]
    image: quay.io/coreos/etcd:v3.5.18
    container_name: reminder-etcd
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command:
      - etcd
      - --advertise-client-urls=http://etcd:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
    volumes:
      - etcd_data:/etcd
    logging: *default-logging
    healthcheck:
      test: ["CMD", "etcdctl", "--endpoints=http://127.0.0.1:2379", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    profiles: ["vector"]
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: reminder-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: minio server /minio_data --console-address ":9001"
    ports:
      - "127.0.0.1:${MINIO_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/minio_data
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: reminder-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  milvus:
    profiles: ["vector"]
    image: milvusdb/milvus:v2.5.16
    container_name: reminder-milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    cpus: ${MILVUS_CPU_LIMIT:-2.0}
    mem_limit: ${MILVUS_MEMORY_LIMIT:-4g}
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: http://etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "127.0.0.1:${MILVUS_PORT:-19530}:19530"
      - "127.0.0.1:${MILVUS_HTTP_PORT:-9091}:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    logging: *default-logging
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_started

  neo4j:
    image: neo4j:5.28
    container_name: reminder-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-change-this-in-production}
    ports:
      - "127.0.0.1:${NEO4J_PORT:-7687}:7687"
      - "127.0.0.1:${NEO4J_HTTP_PORT:-7474}:7474"
    volumes:
      - neo4j_data:/data
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -a bolt://127.0.0.1:7687 -u ${NEO4J_USER:-neo4j} -p ${NEO4J_PASSWORD:-change-this-in-production} 'RETURN 1'"]
      interval: 15s
      timeout: 10s
      retries: 10

  migrate:
    <<: *app-base
    container_name: reminder-migrate
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    logging: *default-logging
    command: ["sh", "/app/docker/start-migrate.sh"]

  app:
    <<: *app-base
    container_name: reminder-app
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "${APP_HOST_PORT:-127.0.0.1:8000}:${APP_PORT:-8000}"
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; import sys; sys.exit(0 if urlopen('http://127.0.0.1:8000/health').status == 200 else 1)"]
      interval: 60s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging: *default-logging
    command: ["sh", "/app/docker/start-api.sh"]

  worker:
    <<: *app-base
    container_name: reminder-worker
    depends_on:
      migrate:
        condition: service_completed_successfully
    logging: *default-logging
    command: ["sh", "/app/docker/start-worker.sh"]

volumes:
  postgres_data:
  etcd_data:
  minio_data:
  milvus_data:
  redis_data:
  neo4j_data:
