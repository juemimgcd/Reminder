name: mneme

x-app-base: &app-base
  build:
    context: .
    dockerfile: Dockerfile
    args:
      PYTHON_VERSION: ${PYTHON_VERSION:-3.12}
      PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
      PIP_EXTRA_INDEX_URL: ${PIP_EXTRA_INDEX_URL:-}
  image: mneme-app:local
  restart: unless-stopped
  init: true
  env_file:
    - .env
  environment:
    DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-123456}@postgres:5432/${POSTGRES_DB:-agentic}
    CELERY_BROKER_URL: redis://redis:6379/0
    CELERY_RESULT_BACKEND: redis://redis:6379/1
    MILVUS_URI: http://milvus:19530
    MILVUS_DB_NAME: ${MILVUS_DB_NAME:-default}
    PYTHONPATH: /app
    WAIT_FOR_HOSTS: postgres:5432,redis:6379,milvus:19530
    WAIT_FOR_URLS: http://milvus:9091/healthz
    WAIT_FOR_TIMEOUT_SECONDS: ${WAIT_FOR_TIMEOUT_SECONDS:-180}
  volumes:
    - ./storage:/app/storage

services:
  postgres:
    image: postgres:17
    container_name: mneme-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123456}
      POSTGRES_DB: ${POSTGRES_DB:-agentic}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-agentic}"]
      interval: 10s
      timeout: 5s
      retries: 10

  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: mneme-etcd
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command:
      - etcd
      - --advertise-client-urls=http://etcd:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
    volumes:
      - etcd_data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "--endpoints=http://127.0.0.1:2379", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: mneme-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: minio server /minio_data --console-address ":9001"
    ports:
      - "127.0.0.1:${MINIO_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/minio_data

  redis:
    image: redis:7-alpine
    container_name: mneme-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  milvus:
    image: milvusdb/milvus:v2.5.16
    container_name: mneme-milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    cpus: ${MILVUS_CPU_LIMIT:-2.0}
    mem_limit: ${MILVUS_MEMORY_LIMIT:-4g}
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: http://etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "127.0.0.1:${MILVUS_PORT:-19530}:19530"
      - "127.0.0.1:${MILVUS_HTTP_PORT:-9091}:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_started

  migrate:
    <<: *app-base
    container_name: mneme-migrate
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus:
        condition: service_started
    command: ["sh", "/app/docker/start-migrate.sh"]

  app:
    <<: *app-base
    container_name: mneme-app
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "${APP_HOST_PORT:-8000}:${APP_PORT:-8000}"
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; import sys; sys.exit(0 if urlopen('http://127.0.0.1:8000/health').status == 200 else 1)"]
      interval: 60s
      timeout: 5s
      retries: 10
      start_period: 30s
    command: ["sh", "/app/docker/start-api.sh"]

  worker:
    <<: *app-base
    container_name: mneme-worker
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: ["sh", "/app/docker/start-worker.sh"]

volumes:
  postgres_data:
  etcd_data:
  minio_data:
  milvus_data:
  redis_data:
