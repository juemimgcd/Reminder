name: mneme-ci-release

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mneme-ci-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/mneme_frontend_v0.2.1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/mneme_frontend_v0.2.1/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify frontend release version
        run: node -e "const fs=require('fs');const pkg=require('./package.json');const version=fs.readFileSync('../../VERSION','utf8').trim();if(pkg.version!==version)process.exit(1)"

      - name: Run frontend type check
        run: npm run lint

      - name: Run frontend contract tests
        run: npm run test:contracts

      - name: Build frontend production bundle
        run: npm run build

  backend-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements/base.txt
            requirements/test.txt
            requirements/dev.txt

      - name: Install backend development dependencies
        run: python -m pip install -r requirements/dev.txt

      - name: Verify backend release version
        run: python -c "from pathlib import Path; from app.mneme.version import __version__; assert __version__ == Path('VERSION').read_text(encoding='utf-8').strip()"

      - name: Compile backend sources
        run: python -m compileall app main.py

      - name: Run backend static checks
        run: python -m ruff check app main.py tests

      - name: Run backend unit tests
        run: python -m pytest -q -p no:cacheprovider

  publish-image:
    runs-on: ubuntu-latest
    needs:
      - frontend-check
      - backend-check
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate release tag
        shell: bash
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must use vMAJOR.MINOR.PATCH (got: ${GITHUB_REF_NAME})." >&2
            exit 1
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/reminder:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/reminder:sha-${{ github.sha }}
