name: reminder-deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: reminder-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/mneme_frontend_v0.2.1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/mneme_frontend_v0.2.1/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend type check
        run: npm run lint

  backend-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile backend sources
        run: python -m compileall app main.py

  deploy-ready:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - name: Check deploy configuration
        id: check
        env:
          DEPLOY_HOST_SECRET: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_HOST_VAR: ${{ vars.DEPLOY_HOST }}
          DEPLOY_USER_SECRET: ${{ secrets.DEPLOY_USER }}
          DEPLOY_USER_VAR: ${{ vars.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
        run: |
          set -euo pipefail
          DEPLOY_HOST="${DEPLOY_HOST_SECRET:-${DEPLOY_HOST_VAR:-}}"
          DEPLOY_USER="${DEPLOY_USER_SECRET:-${DEPLOY_USER_VAR:-}}"

          if [[ -z "${DEPLOY_HOST}" || -z "${DEPLOY_USER}" || ( -z "${DEPLOY_SSH_KEY}" && -z "${DEPLOY_PASSWORD}" ) ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Deploy job skipped because required deploy configuration is missing."
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"

  deploy:
    runs-on: ubuntu-latest
    needs:
      - frontend-check
      - backend-check
      - deploy-ready
    if: ${{ needs.deploy-ready.outputs.enabled == 'true' }}
    steps:
      - name: Validate deploy configuration
        env:
          DEPLOY_HOST_SECRET: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_HOST_VAR: ${{ vars.DEPLOY_HOST }}
          DEPLOY_PORT_SECRET: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_PORT_VAR: ${{ vars.DEPLOY_PORT }}
          DEPLOY_USER_SECRET: ${{ secrets.DEPLOY_USER }}
          DEPLOY_USER_VAR: ${{ vars.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
          DEPLOY_APP_DIR: ${{ vars.DEPLOY_APP_DIR }}
        run: |
          set -euo pipefail
          missing=()
          DEPLOY_HOST="${DEPLOY_HOST_SECRET:-${DEPLOY_HOST_VAR:-}}"
          DEPLOY_PORT="${DEPLOY_PORT_SECRET:-${DEPLOY_PORT_VAR:-}}"
          DEPLOY_USER="${DEPLOY_USER_SECRET:-${DEPLOY_USER_VAR:-}}"

          if [[ -n "${DEPLOY_HOST_SECRET}" ]]; then
            echo "::notice::DEPLOY_HOST loaded from repository secret."
          elif [[ -n "${DEPLOY_HOST_VAR}" ]]; then
            echo "::notice::DEPLOY_HOST loaded from repository variable."
          fi

          if [[ -n "${DEPLOY_USER_SECRET}" ]]; then
            echo "::notice::DEPLOY_USER loaded from repository secret."
          elif [[ -n "${DEPLOY_USER_VAR}" ]]; then
            echo "::notice::DEPLOY_USER loaded from repository variable."
          fi

          if [[ -n "${DEPLOY_PORT_SECRET}" ]]; then
            echo "::notice::DEPLOY_PORT loaded from repository secret."
          elif [[ -n "${DEPLOY_PORT_VAR}" ]]; then
            echo "::notice::DEPLOY_PORT loaded from repository variable."
          fi

          [[ -n "${DEPLOY_HOST}" ]] || missing+=("DEPLOY_HOST")
          [[ -n "${DEPLOY_USER}" ]] || missing+=("DEPLOY_USER")

          if (( ${#missing[@]} > 0 )); then
            echo "::error::Missing required GitHub Actions deploy configuration: ${missing[*]}"
            echo "::error::Set them in Repository variables or Repository secrets. See github-actions.secrets.example in the repo root."
            exit 1
          fi

          if [[ -z "${DEPLOY_SSH_KEY}" && -z "${DEPLOY_PASSWORD}" ]]; then
            echo "::error::Missing deploy authentication secret. Set DEPLOY_SSH_KEY or DEPLOY_PASSWORD."
            echo "::error::SSH key auth is recommended, but password auth is also supported by this workflow."
            exit 1
          fi

          if [[ -z "${DEPLOY_APP_DIR}" ]]; then
            echo "::warning::DEPLOY_APP_DIR is not set. Falling back to /opt/reminder."
          fi

          if [[ -z "${DEPLOY_PORT}" ]]; then
            echo "::notice::DEPLOY_PORT is not set. Falling back to 22."
          fi

      - name: Prepare SSH client
        env:
          DEPLOY_HOST_SECRET: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_HOST_VAR: ${{ vars.DEPLOY_HOST }}
          DEPLOY_PORT_SECRET: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_PORT_VAR: ${{ vars.DEPLOY_PORT }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
        run: |
          set -euo pipefail
          DEPLOY_HOST="${DEPLOY_HOST_SECRET:-${DEPLOY_HOST_VAR:-}}"
          DEPLOY_PORT="${DEPLOY_PORT_SECRET:-${DEPLOY_PORT_VAR:-22}}"

          if [[ -n "${DEPLOY_SSH_KEY}" ]]; then
            install -m 700 -d ~/.ssh
            printf '%s\n' "${DEPLOY_SSH_KEY}" > ~/.ssh/reminder_deploy_key
            chmod 600 ~/.ssh/reminder_deploy_key
            ssh-keyscan -p "${DEPLOY_PORT}" -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts
          elif [[ -n "${DEPLOY_PASSWORD}" ]]; then
            sudo apt-get update
            sudo apt-get install -y sshpass
          fi

      - name: Run remote deploy script
        env:
          DEPLOY_HOST_SECRET: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_HOST_VAR: ${{ vars.DEPLOY_HOST }}
          DEPLOY_PORT_SECRET: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_PORT_VAR: ${{ vars.DEPLOY_PORT }}
          DEPLOY_USER_SECRET: ${{ secrets.DEPLOY_USER }}
          DEPLOY_USER_VAR: ${{ vars.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
          DEPLOY_APP_DIR: ${{ vars.DEPLOY_APP_DIR }}
          DEPLOY_BRANCH: ${{ vars.DEPLOY_BRANCH }}
          DEPLOY_ENABLE_NGINX_SYNC: ${{ vars.DEPLOY_ENABLE_NGINX_SYNC }}
        run: |
          set -euo pipefail
          DEPLOY_HOST="${DEPLOY_HOST_SECRET:-${DEPLOY_HOST_VAR:-}}"
          DEPLOY_PORT="${DEPLOY_PORT_SECRET:-${DEPLOY_PORT_VAR:-22}}"
          DEPLOY_USER="${DEPLOY_USER_SECRET:-${DEPLOY_USER_VAR:-}}"
          DEPLOY_APP_DIR="${DEPLOY_APP_DIR:-/opt/reminder}"
          DEPLOY_BRANCH="${DEPLOY_BRANCH:-master}"
          DEPLOY_ENABLE_NGINX_SYNC="${DEPLOY_ENABLE_NGINX_SYNC:-1}"

          REMOTE_CMD="APP_DIR='${DEPLOY_APP_DIR}' BRANCH='${DEPLOY_BRANCH}' ENABLE_NGINX_SYNC='${DEPLOY_ENABLE_NGINX_SYNC}' bash '${DEPLOY_APP_DIR}/github-actions.deploy.sh'"

          if [[ -n "${DEPLOY_SSH_KEY}" ]]; then
            ssh -i ~/.ssh/reminder_deploy_key -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" "${REMOTE_CMD}"
          else
            sshpass -p "${DEPLOY_PASSWORD}" ssh \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -p "${DEPLOY_PORT}" \
              "${DEPLOY_USER}@${DEPLOY_HOST}" \
              "${REMOTE_CMD}"
          fi
