limit_req_zone $binary_remote_addr zone=mneme_general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=mneme_api:10m rate=5r/s;
limit_conn_zone $binary_remote_addr zone=mneme_conn:10m;

upstream mneme_app {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name www.mneme.com.cn;

    client_max_body_size 100m;
    server_tokens off;
    limit_conn mneme_conn 20;

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    location /api/ {
        limit_req zone=mneme_api burst=20 nodelay;
        proxy_pass http://mneme_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_read_timeout 300;
        proxy_send_timeout 300;
    }

    location / {
        limit_req zone=mneme_general burst=40 nodelay;
        proxy_pass http://mneme_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300;
        proxy_send_timeout 300;
    }
}
